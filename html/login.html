<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="../css/defaultStyles.css">
    <link rel="stylesheet" href="../css/cadastro_login.css">
</head>
<body>
    <div class="cadastro_login-container">
        <div class="cadastro_login-observacoes" >
            <img src="../src-images/CAENS logo 1.png" alt="logo caens" id="logo_caens_cadastro_login">
        </div>
        <form id="cadastro_login-form">
            <div class="form-group">
                <label for="email">E-mail:</label>
                <input type="email" id="email" placeholder="matricula@ifba.edu.br" name="email" required>
                <span id="emailError" class="error"></span>
            </div>

            <div class="form-group">
                <label for="senha">Senha:</label>
                <input type="password" id="senha" name="senha" required>
                <span id="senhaError" class="error"></span>
            </div>

            <button type="submit">Entrar</button>
            <div class="login-observacoes" >
                <a href="../html/cadastro.html">Cadastre-se</a>
            </div>
        </form>
    </div>
    <script src="../javascript/user_login_cadastro_validate.js""></script>
</body>
</html>
